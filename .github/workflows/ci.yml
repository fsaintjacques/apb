name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DUCKDB_VERSION: v1.5.1

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DUCKDB_LIB_DIR: /usr/local/lib
      DUCKDB_INC_DIR: /usr/local/include
    steps:
      - uses: actions/checkout@v4
      - name: Install duckdb
        run: |
          curl -fsSL "https://github.com/duckdb/duckdb/releases/download/${DUCKDB_VERSION}/libduckdb-linux-amd64.zip" -o libduckdb.zip
          unzip libduckdb.zip -d libduckdb
          sudo cp libduckdb/libduckdb.so /usr/local/lib/
          sudo cp libduckdb/duckdb.h /usr/local/include/
          sudo ldconfig
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: make check
